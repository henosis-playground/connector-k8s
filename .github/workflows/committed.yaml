# Not run through pre-commit checks because they don't handle sending the correct commit
# range to `committed`; PR-only because the action lints the PR's commit range.
name: Lint Commits
permissions:
  contents: read
on:
  pull_request:
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  committed:
    name: Lint Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Lint commits
        # LINT.IfChange(committed_version)
        uses: crate-ci/committed@faeed42f2e10c244533a01525f13c4d8b6ce383f # v1.1.11
        # LINT.ThenChange(//.pre-commit-config.yaml:committed_version)
