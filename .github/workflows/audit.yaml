name: Audit
permissions:
  contents: read
on:
  pull_request:
  push:
    branches: [main]
env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CLICOLOR: 1
  # LINT.IfChange(msrv)
  RUSTUP_TOOLCHAIN: "1.96.0"
  # LINT.ThenChange(//Cargo.toml:msrv)
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  audit:
    permissions:
      contents: none
    name: Audit
    needs: [advisories, cargo_deny, actions]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Failed
        run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
  advisories:
    name: Advisories
    permissions:
      contents: read
      issues: write
      checks: write
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Lint advisories
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories
          rust-version: ${{ env.RUSTUP_TOOLCHAIN }}
  cargo_deny:
    name: Bans, licenses, and sources
    permissions:
      contents: read
      issues: write
      checks: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Lint bans, licenses, and sources
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check bans licenses sources
          rust-version: ${{ env.RUSTUP_TOOLCHAIN }}
  actions:
    name: Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: ${{ github.event.repository.visibility == 'public' }}
