name: ifttt-lint
permissions:
  contents: read
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  ifttt-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: true
      - name: Run ifttt-lint
        # LINT.IfChange(ifttt_lint_version)
        uses: simonepri/ifttt-lint@bfaec4d0ba560f41794b7b71597f575bbd2a0438 # v0.10.5
        # LINT.ThenChange(//.pre-commit-config.yaml:ifttt_lint_version)
